<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
  <!-- Colorful gradient background -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff7675;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#fdcb6e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#74b9ff;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Smiling Star with Game elements -->
  <g filter="url(#shadow)">
    <!-- The Star Shape -->
    <path d="M32,4 L39.5,20 L57,22.5 L44.5,35 L47.5,52.5 L32,44 L16.5,52.5 L19.5,35 L7,22.5 L24.5,20 Z" fill="url(#grad)" stroke="#ffffff" stroke-width="2.5" stroke-linejoin="round"/>
    
    <!-- Left Eye -->
    <ellipse cx="25" cy="27" rx="3.5" ry="5" fill="#2d3436"/>
    <circle cx="24" cy="25" r="1.2" fill="#ffffff"/>
    
    <!-- Right Eye -->
    <ellipse cx="39" cy="27" rx="3.5" ry="5" fill="#2d3436"/>
    <circle cx="38" cy="25" r="1.2" fill="#ffffff"/>

    <!-- Rosy Cheeks -->
    <circle cx="19" cy="32" r="3.5" fill="#ff7675" opacity="0.8"/>
    <circle cx="45" cy="32" r="3.5" fill="#ff7675" opacity="0.8"/>

    <!-- Happy Mouth -->
    <path d="M28,32 Q32,37 36,32" fill="none" stroke="#2d3436" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Cute sparkles / stars inside -->
    <path d="M14,14 L16,16 M16,14 L14,16" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M48,14 L50,16 M50,14 L48,16" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>