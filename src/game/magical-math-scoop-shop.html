<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Magical Ice Cream Shop!</title>
    <style>
        :root { 
            --bg-color: #f7f9fc; 
            --text-color: #2c3e50; 
        } 
        body { 
            font-family: 'Arial Rounded MT Bold', sans-serif; 
            margin: 0; 
            padding: 10px; 
            background: #eef2f7; 
            color: var(--text-color); 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            box-sizing: border-box; 
            touch-action: none; 
            overflow: hidden; 
        } 
        @keyframes popIn { 
            0% { transform: scale(0); opacity: 0; } 
            80% { transform: scale(1.1); } 
            100% { transform: scale(1); opacity: 1; } 
        } 
        .game-wrapper { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-around; 
            width: 100%; 
            gap: 10px; 
        } 
        .hud-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: white; 
            padding: 15px; 
            border-radius: 20px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        } 
        .play-arena { 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-end; 
            background: white; 
            border-radius: 30px; 
            border: 5px solid #81ecec; 
            position: relative; 
            overflow: hidden; 
        } 
        /* Decreased cone size for better proportions */
        .cone-target { 
            width: 70px; 
            height: 90px; 
            margin-bottom: 20px; 
            position: relative; 
            z-index: 2; 
            transition: transform 0.3s; 
        } 
        .waffle-cone { 
            width: 100%; 
            height: 100%; 
            background: #cf8a67; 
            clip-path: polygon(0 0, 100% 0, 50% 100%); 
        } 
        .scoops-stack-container { 
            width: 100%; 
            display: flex; 
            flex-direction: column-reverse; 
            align-items: center; 
            margin-bottom: -15px; 
            z-index: 3;
        } 
        /* Optimized sizes so multiple scoops stack flawlessly */
        .stacked-scoop { 
            width: 75px; 
            height: 60px; 
            border-radius: 50%; 
            margin-bottom: -35px; 
            box-shadow: inset 0 -8px 0 rgba(0,0,0,0.1); 
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        } 
        .flavor-dock { 
            display: flex; 
            justify-content: space-around; 
            align-items: center;
            padding: 10px; 
            background: #fff; 
            border-radius: 20px; 
            gap: 10px;
            min-height: 80px;
        } 
        .flavor-scoop-source { 
            width: 70px; 
            height: 70px; 
            border-radius: 50%; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 30px; 
            transition: transform 0.2s; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        } 
        .flavor-scoop-source:active {
            transform: scale(0.9);
        }
        .reset-btn {
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            background: #ff7675;
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .reset-btn:active {
            transform: scale(0.95);
        }
        .splash-overlay { 
            position: fixed; 
            inset: 0; 
            background: #a8e6cf; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            z-index: 9999; 
        } 
        .start-btn { 
            padding: 20px 40px; 
            font-size: 24px; 
            background: #ff7675; 
            color: white; 
            border: none; 
            border-radius: 20px; 
            cursor: pointer; 
        } 
        .math-overlay { 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.8); 
            display: none; 
            align-items: center; 
            justify-content: center; 
            z-index: 10000; 
        } 
        .math-card { 
            background: white; 
            padding: 20px; 
            border-radius: 20px; 
            text-align: center; 
            width: 80%; 
            animation: popIn 0.5s; 
        } 
        .math-btn { 
            padding: 20px; 
            margin: 10px; 
            font-size: 24px; 
            border-radius: 15px; 
            border: none; 
            background: #74b9ff; 
            color: white; 
            width: 80px; 
        } 
        #orderSpeechBubble { 
            font-size: 18px; 
            font-weight: bold; 
            padding: 10px; 
            background: #fab1a0; 
            border-radius: 15px; 
            color: white; 
            text-align: center; 
        }
    </style>
</head>
<body>

<div class="splash-overlay" id="splashScreen">
    <h1>🍦 Magical Math!</h1>
    <button class="start-btn" id="playButton">▶ START</button>
</div>

<div class="game-wrapper">
    <header class="hud-bar">
        <div>Round: <span id="roundCount">1</span>/5</div>
        <div id="scoreVal">Score: 0</div>
    </header>
    
    <div id="orderSpeechBubble">Loading...</div>
    
    <main class="play-arena" id="playArena">
        <div class="scoops-stack-container" id="scoopsStackContainer"></div>
        <div class="cone-target"><div class="waffle-cone"></div></div>
    </main>
    
    <footer class="flavor-dock" id="flavorDock"></footer>
</div>

<div class="math-overlay" id="mathOverlay">
    <div class="math-card">
        <h2 id="eq">How many scoops added?</h2>
        <div id="mathOptionsGrid"></div>
    </div>
</div>

<script>
    let round = 1, score = 0, correctCount = 0;
    let targetCounts = [0, 0]; // Array keeping track of requirements for flavor 1 and flavor 2
    let addedCounts = [0, 0];  // Array keeping track of added scoops for flavor 1 and flavor 2
    let roundFlavors = [];     // Holds the objects of the chosen flavors for the current round

    // Expanded Flavors Pool
    const flavorPool = [
        { name: "Chocolate", emoji: "🍫", color: "#8d6e63" },
        { name: "Vanilla", emoji: "🍦", color: "#ffeaa7" },
        { name: "Strawberry", emoji: "🍓", color: "#ff8793" },
        { name: "Mint", emoji: "🌿", color: "#a8e6cf" },
        { name: "Blueberry", emoji: "🫐", color: "#74b9ff" }
    ];

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)(); 

    function playSound(freq) { 
        const osc = audioCtx.createOscillator(); 
        const gain = audioCtx.createGain(); 
        osc.type = 'sine'; 
        osc.frequency.value = freq; 
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime); 
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5); 
        osc.connect(gain); 
        gain.connect(audioCtx.destination); 
        osc.start(); 
        osc.stop(audioCtx.currentTime + 0.5); 
    } 

    document.getElementById('playButton').onclick = () => { 
        document.getElementById('splashScreen').style.display = 'none'; 
        initRound(); 
    }; 

    function clearCone() {
        addedCounts = [0, 0]; 
        document.getElementById('scoopsStackContainer').innerHTML = ''; 
        document.getElementById('orderSpeechBubble').textContent = 
            `Add ${targetCounts[0]} ${roundFlavors[0].name} and ${targetCounts[1]} ${roundFlavors[1].name} scoops!`;
    }

    function initRound() { 
        document.getElementById('roundCount').textContent = round; 
        
        // Pick 2 distinct flavors randomly from the pool
        const shuffled = [...flavorPool].sort(() => Math.random() - 0.5);
        roundFlavors = [shuffled[0], shuffled[1]];

        // Determine scoops targets (1 to 3)
        targetCounts[0] = Math.floor(Math.random() * 3) + 1; 
        targetCounts[1] = Math.floor(Math.random() * 3) + 1; 

        setupDock();
        clearCone();
    } 

    // Dynamically build buttons for the chosen flavors of the round
    function setupDock() {
        const dock = document.getElementById('flavorDock');
        dock.innerHTML = '';

        // Button for Flavor 1
        const btn1 = document.createElement('div');
        btn1.className = 'flavor-scoop-source';
        btn1.style.backgroundColor = roundFlavors[0].color;
        btn1.textContent = roundFlavors[0].emoji;
        btn1.onclick = () => addScoop(0);

        // Reset Button
        const resetBtn = document.createElement('button');
        resetBtn.className = 'reset-btn';
        resetBtn.id = 'resetBtn';
        resetBtn.innerHTML = 'Reset 🔄';
        resetBtn.onclick = () => {
            playSound(300);
            clearCone();
        };

        // Button for Flavor 2
        const btn2 = document.createElement('div');
        btn2.className = 'flavor-scoop-source';
        btn2.style.backgroundColor = roundFlavors[1].color;
        btn2.textContent = roundFlavors[1].emoji;
        btn2.onclick = () => addScoop(1);

        dock.appendChild(btn1);
        dock.appendChild(resetBtn);
        dock.appendChild(btn2);
    }

    function addScoop(flavorIndex) {
        addedCounts[flavorIndex]++; 

        const s = document.createElement('div'); 
        s.className = 'stacked-scoop'; 
        s.style.backgroundColor = roundFlavors[flavorIndex].color; 
        document.getElementById('scoopsStackContainer').appendChild(s); 
        playSound(440); 

        // If order matches exactly, trigger math setup
        if(addedCounts[0] === targetCounts[0] && addedCounts[1] === targetCounts[1]) { 
            document.getElementById('orderSpeechBubble').textContent = "Yum! Let's count the total scoops!"; 
            setTimeout(showMath, 1000); 
        } 
    }

    function showMath() { 
        const total = targetCounts[0] + targetCounts[1];
        document.getElementById('mathOverlay').style.display = 'flex'; 
        document.getElementById('eq').textContent = `Solve: ${targetCounts[0]} + ${targetCounts[1]} = ?`; 
        document.getElementById('mathOptionsGrid').innerHTML = ''; 
        
        [total, total + 1]
            .sort(() => Math.random() - 0.5)
            .forEach(num => { 
                const b = document.createElement('button'); 
                b.className = 'math-btn'; 
                b.textContent = num; 
                b.onclick = () => check(num); 
                document.getElementById('mathOptionsGrid').appendChild(b); 
            }); 
    } 

    function check(val) { 
        const total = targetCounts[0] + targetCounts[1];
        if(val === total) { 
            playSound(660); 
            score += 20; 
            correctCount++; 
            document.getElementById('scoreVal').textContent = 'Score: ' + score; 
            document.getElementById('mathOverlay').style.display = 'none'; 
            round++; 
            if(round > 5) { 
                parent.postMessage({ type: 'game_complete', success: true, correctCount: correctCount, incorrectCount: 5-correctCount }, '*'); 
                alert("Game Over! Final Score: " + score);
            } else { 
                initRound(); 
            } 
        } else { 
            playSound(220); 
            parent.postMessage({ type: 'game_attempt', success: false }, '*'); 
            alert("Oops! Try looking closely at the scoops!");
        } 
    }
</script>
</body>
</html>
