<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><title>Magical Ice Cream Shop!</title><style>:root { --bg-color: #f7f9fc; --text-color: #2c3e50; } body { font-family: 'Arial Rounded MT Bold', sans-serif; margin: 0; padding: 10px; background: #eef2f7; color: var(--text-color); display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; touch-action: none; overflow: hidden; } @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 80% { transform: scale(1.2); } 100% { transform: scale(1); opacity: 1; } } .game-wrapper { flex: 1; display: flex; flex-direction: column; justify-content: space-around; width: 100%; gap: 10px; } .hud-bar { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); } .play-arena { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; background: white; border-radius: 30px; border: 5px solid #81ecec; position: relative; overflow: hidden; } .cone-target { width: 100px; height: 130px; margin-bottom: 20px; position: relative; z-index: 2; transition: transform 0.3s; } .waffle-cone { width: 100%; height: 100%; background: #cf8a67; clip-path: polygon(0 0, 100% 0, 50% 100%); } .scoops-stack-container { width: 100%; display: flex; flex-direction: column-reverse; align-items: center; margin-bottom: -20px; } .stacked-scoop { width: 90px; height: 75px; border-radius: 50%; margin-bottom: -40px; box-shadow: inset 0 -10px 0 rgba(0,0,0,0.1); animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); } .flavor-dock { display: flex; justify-content: space-around; padding: 10px; background: #fff; border-radius: 20px; } .flavor-scoop-source { width: 70px; height: 70px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 30px; transition: transform 0.2s; } .splash-overlay { position: fixed; inset: 0; background: #a8e6cf; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; } .start-btn { padding: 20px 40px; font-size: 24px; background: #ff7675; color: white; border: none; border-radius: 20px; cursor: pointer; } .math-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 10000; } .math-card { background: white; padding: 20px; border-radius: 20px; text-align: center; width: 80%; animation: popIn 0.5s; } .math-btn { padding: 20px; margin: 10px; font-size: 24px; border-radius: 15px; border: none; background: #74b9ff; color: white; width: 80px; } #orderSpeechBubble { font-size: 18px; font-weight: bold; padding: 10px; background: #fab1a0; border-radius: 15px; color: white; text-align: center; }</style></head><body><div class="splash-overlay" id="splashScreen"><h1>🍦 Magical Math!</h1><button class="start-btn" id="playButton">▶ START</button></div><div class="game-wrapper"><header class="hud-bar"><div>Round: <span id="roundCount">1</span>/5</div><div id="scoreVal">Score: 0</div></header><div id="orderSpeechBubble">Loading...</div><main class="play-arena" id="playArena"><div class="scoops-stack-container" id="scoopsStackContainer"></div><div class="cone-target"><div class="waffle-cone"></div></div></main><footer class="flavor-dock"><div class="flavor-scoop-source" style="background:#8d6e63" data-flavor="Chocolate" data-color="#8d6e63">🍫</div><div class="flavor-scoop-source" style="background:#ffeaa7" data-flavor="Vanilla" data-color="#ffeaa7">🍦</div></footer></div><div class="math-overlay" id="mathOverlay"><div class="math-card"><h2 id="eq">How many scoops added?</h2><div id="mathOptionsGrid"></div></div></div><script>let round = 1, score = 0, correctCount = 0, currentTarget = {choc: 0, van: 0}; const audioCtx = new (window.AudioContext || window.webkitAudioContext)(); function playSound(freq) { const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.type = 'sine'; osc.frequency.value = freq; gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.5); } document.getElementById('playButton').onclick = () => { document.getElementById('splashScreen').style.display = 'none'; initRound(); }; function initRound() { document.getElementById('roundCount').textContent = round; document.getElementById('scoopsStackContainer').innerHTML = ''; currentTarget.choc = Math.floor(Math.random() * 3) + 1; currentTarget.van = Math.floor(Math.random() * 3) + 1; document.getElementById('orderSpeechBubble').textContent = 'Add '+currentTarget.choc+' chocolate and '+currentTarget.van+' vanilla scoops!'; } document.querySelectorAll('.flavor-scoop-source').forEach(el => { el.onclick = () => { const s = document.createElement('div'); s.className = 'stacked-scoop'; s.style.backgroundColor = el.getAttribute('data-color'); document.getElementById('scoopsStackContainer').appendChild(s); playSound(440); const totalAdded = document.querySelectorAll('.stacked-scoop').length; if(totalAdded >= (currentTarget.choc + currentTarget.van)) showMath(); }; }); function showMath() { document.getElementById('mathOverlay').style.display = 'flex'; document.getElementById('eq').textContent = currentTarget.choc + ' + ' + currentTarget.van + ' = ?'; document.getElementById('mathOptionsGrid').innerHTML = ''; [currentTarget.choc + currentTarget.van, (currentTarget.choc + currentTarget.van + 1)].sort(() => Math.random() - 0.5).forEach(num => { const b = document.createElement('button'); b.className = 'math-btn'; b.textContent = num; b.onclick = () => check(num); document.getElementById('mathOptionsGrid').appendChild(b); }); } function check(val) { if(val === (currentTarget.choc + currentTarget.van)) { playSound(660); score += 20; correctCount++; document.getElementById('scoreVal').textContent = 'Score: ' + score; document.getElementById('mathOverlay').style.display = 'none'; round++; if(round > 5) { parent.postMessage({ type: 'game_complete', success: true, correctCount: correctCount, incorrectCount: 5-correctCount }, '*'); } else { initRound(); } } else { playSound(220); parent.postMessage({ type: 'game_attempt', success: false }, '*'); } }</script></body></html>
