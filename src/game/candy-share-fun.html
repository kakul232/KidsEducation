<!DOCTYPE html>
<html>

<head>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <style>
        body {
            font-family: sans-serif;
            background: #f0f9ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            touch-action: manipulation
        }

        #game-box {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
            text-align: center
        }

        button {
            font-size: 24px;
            padding: 15px 30px;
            margin: 10px;
            border-radius: 15px;
            border: none;
            background: #4ade80;
            color: white;
            cursor: pointer
        }

        #feedback {
            font-size: 20px;
            font-weight: bold;
            margin: 20px 0;
            min-height: 30px;
            color: #059669
        }

        .candy {
            font-size: 40px;
            margin: 5px
        }
    </style>
</head>

<body>
    <div id='game-box'>
        <h1>Divide the Candy!</h1>
        <div id='question' style='font-size:32px;margin:20px'></div>
        <div id='options'></div>
        <div id='feedback'></div>
        <div id='score'></div>
    </div>
    <script>let score = 0; let currentAnswer = 0; function nextRound() { if (score >= 10) { document.getElementById('game-box').innerHTML = '<h1>You did it! 🌟</h1><p>You shared everything perfectly!</p>'; return } const total = Math.floor(Math.random() * 4 + 2) * 2; const people = 2; currentAnswer = total / people; document.getElementById('question').innerText = `Share ${total} candies between ${people} friends. How many for each?`; const options = [currentAnswer, currentAnswer + 1, currentAnswer - 1].sort(() => Math.random() - 0.5); const container = document.getElementById('options'); container.innerHTML = ''; options.forEach(opt => { const btn = document.createElement('button'); btn.innerText = opt; btn.onclick = () => checkAnswer(opt); container.appendChild(btn) }) } function checkAnswer(val) { if (val === currentAnswer) { score++; document.getElementById('feedback').innerText = 'Great job! Keep going! 🎉'; window.parent.postMessage({ type: 'game_complete', success: true, correctCount: 1, incorrectCount: 0 }, '*'); setTimeout(nextRound, 1500) } else { document.getElementById('feedback').innerText = 'Great try! Let\'s try again.'; window.parent.postMessage({ type: 'game_attempt', success: false }, '*') } document.getElementById('score').innerText = `Score: ${score}/10` } nextRound()</script>
</body>

</html>
