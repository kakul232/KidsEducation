<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Balloon Pop Arithmetic</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            background: #0f172a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        .container {
            width: 100%;
            max-width: 360px;
            height: 100%;
            max-height: 640px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 15px;
            box-sizing: border-box;
        }

        #screen,
        #game {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            color: #f1c40f;
            font-size: 2.2rem;
            margin: 20px 0 10px 0;
            text-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        p {
            font-size: 1.2rem;
            color: #cbd5e1;
            margin: 0 10px;
            line-height: 1.5;
        }

        .large-btn {
            padding: 20px;
            width: 100%;
            font-size: 1.6rem;
            font-weight: bold;
            border: none;
            border-radius: 16px;
            background: #e74c3c;
            color: white;
            cursor: pointer;
            box-shadow: 0 6px #c0392b;
            transition: all 0.1s;
            user-select: none;
            -webkit-user-select: none;
        }

        .large-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px #c0392b;
        }

        #hud {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e293b;
            padding: 12px;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 1.3rem;
            font-weight: bold;
        }

        #target-box {
            font-size: 1.3rem;
            color: #f1c40f;
            background: #1e293b;
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            box-sizing: border-box;
            border: 2px dashed #f1c40f;
            margin: 5px 0;
        }

        canvas {
            background: linear-gradient(#1e3a8a, #3b82f6);
            border: 4px solid #1e293b;
            border-radius: 16px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
            touch-action: none;
        }

        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 10;
        }

        #card {
            background: #1e293b;
            padding: 30px 20px;
            border-radius: 24px;
            border: 4px solid #f1c40f;
            width: 100%;
            max-width: 300px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="container">
        <div id="screen" style="display: flex;">
            <div>
                <h1>🎈 Balloon Pop</h1>
                <p>Tap directly on the floating balloons to pop them! Combine numbers to match the target sum!</p>
            </div>
            <div style="font-size: 80px; margin: 20px 0;">🎈</div>
            <button id="start" class="large-btn" style="background: #2ecc71; box-shadow: 0 6px #27ae60;">▶ Play
                Game</button>
        </div>

        <div id="game" style="display: none;">
            <div id="hud">
                <span id="scoreEl" style="color: #2ecc71;">🎈 Popped: 0</span>
                <span id="starsEl" style="color: #f1c40f;">⭐ 0</span>
            </div>
            <div id="target-box">🎯 Target Sum: --</div>

            <canvas id="cv"></canvas>

            <div style="font-size: 1.1rem; color: #94a3b8; margin: 10px 0; font-weight: bold;">👋 Tap the balloons
                directly!</div>
        </div>
    </div>

    <div id="overlay">
        <div id="card">
            <h2 id="title" style="font-size: 2rem; margin-top: 0; color: #f1c40f;">🧩 Puzzle</h2>
            <div id="content"></div>
        </div>
    </div>

    <script>
        const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
        const scoreEl = document.getElementById('scoreEl');
        const starsEl = document.getElementById('starsEl');
        const targetBox = document.getElementById('target-box');
        const overlay = document.getElementById('overlay');
        const title = document.getElementById('title');
        const content = document.getElementById('content');
        const mainMenuScreen = document.getElementById('screen');
        const gameScreen = document.getElementById('game');

        // Setup sizing layout parameters safely
        const cWidth = Math.min(innerWidth - 30, 330);
        const cHeight = Math.min(innerHeight - 220, 380);
        cv.width = cWidth;
        cv.height = cHeight;

        let balloons = [], score = 0, stars = 0, targetSum = 0, currentRunningSum = 0, run = false, paused = false;
        const colors = ['#ff7675', '#74b9ff', '#a29bfe', '#00b894', '#fdcb6e'];

        function init() {
            balloons = [];
            score = 0;
            stars = 0;
            currentRunningSum = 0;
            pickRandomTarget();
            scoreEl.textContent = '🎈 Popped: 0';
            starsEl.textContent = '⭐ 0';
        }

        function pickRandomTarget() {
            targetSum = Math.floor(Math.random() * 10) + 6;
            updateTargetUI();
        }

        // UI text injection safely caught via variables 
        function updateTargetUI() {
            if (targetBox) {
                targetBox.innerText = `🎯 Target: Get numbers adding to ${targetSum}!\n(Collected: ${currentRunningSum})`;
            }
        }

        function spawnBalloon() {
            if (balloons.length >= 5) return;

            let radiusX = 24;
            let radiusY = 30;
            let spawnX = radiusX + Math.random() * (cWidth - radiusX * 2);

            if (balloons.some(b => Math.abs(b.x - spawnX) < 45 && b.y > cHeight - 50)) return;

            let val = Math.floor(Math.random() * (targetSum - 1)) + 1;
            if (val > 9) val = Math.floor(Math.random() * 8) + 1;

            balloons.push({
                x: spawnX,
                y: cHeight + 40,
                rx: radiusX,
                ry: radiusY,
                v: val,
                speed: 1.0 + Math.random() * 1.2,
                color: colors[Math.floor(Math.random() * colors.length)]
            });
        }

        function draw() {
            ctx.clearRect(0, 0, cWidth, cHeight);

            balloons.forEach(b => {
                ctx.fillStyle = b.color;
                ctx.beginPath();
                ctx.ellipse(b.x, b.y, b.rx, b.ry, 0, 0, Math.PI * 2);
                ctx.fill();

                ctx.beginPath();
                ctx.moveTo(b.x, b.y + b.ry);
                ctx.lineTo(b.x - 5, b.y + b.ry + 6);
                ctx.lineTo(b.x + 5, b.y + b.ry + 6);
                ctx.closePath();
                ctx.fill();

                ctx.strokeStyle = '#e2e8f0';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(b.x, b.y + b.ry + 6);
                ctx.lineTo(b.x, b.y + b.ry + 25);
                ctx.stroke();

                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 22px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = 'rgba(0, 0, 0, 0.4)';
                ctx.shadowBlur = 4;
                ctx.fillText(b.v, b.x, b.y);
                ctx.shadowBlur = 0;
            });
        }

        function updatePhysics() {
            for (let i = balloons.length - 1; i >= 0; i--) {
                balloons[i].y -= balloons[i].speed;
                if (balloons[i].y < -40) {
                    balloons.splice(i, 1);
                }
            }

            if (Math.random() < 0.025) {
                spawnBalloon();
            }
        }

        function handleInteraction(clickX, clickY) {
            if (!run || paused) return;

            for (let i = balloons.length - 1; i >= 0; i--) {
                let b = balloons[i];
                let dx = (clickX - b.x) / b.rx;
                let dy = (clickY - b.y) / b.ry;

                if ((dx * dx + dy * dy) <= 1) {
                    popEffect(b.v);
                    balloons.splice(i, 1);
                    break;
                }
            }
        }

        function popEffect(val) {
            score++;
            scoreEl.textContent = '🎈 Popped: ' + score;

            if (currentRunningSum === 0) {
                currentRunningSum = val;
            } else {
                let combined = currentRunningSum + val;
                if (combined === targetSum) {
                    stars++;
                    starsEl.textContent = '⭐ ' + stars;
                    currentRunningSum = 0;
                    triggerPopup('✨ Perfect Match!', '#2ecc71', `Awesome! You hit the ${targetSum} goal!`);
                } else if (combined > targetSum) {
                    currentRunningSum = 0;
                    triggerPopup('💥 Over Target!', '#e74c3c', `Oops, ${combined} went over ${targetSum}! Let's try a fresh target.`);
                } else {
                    currentRunningSum = combined;
                }
            }
            updateTargetUI();
        }

        function triggerPopup(msg, color, subtitle) {
            paused = true;
            overlay.style.display = 'flex';
            title.textContent = msg;
            title.style.color = color;
            content.innerHTML = `<p>${subtitle}</p><button class="large-btn" style="margin-top:15px; background:${color}; box-shadow: 0 4px rgba(0,0,0,0.2);" onclick="dismissPopup()">Next Challenge</button>`;
        }

        function dismissPopup() {
            overlay.style.display = 'none';
            paused = false;
            if (stars >= 5) {
                endGame();
            } else {
                pickRandomTarget();
            }
        }

        function endGame() {
            run = false;
            overlay.style.display = 'flex';
            title.textContent = '🏆 Math Superstar!';
            title.style.color = '#f1c40f';
            content.innerHTML = '<p>Incredible! You collected 5 Stars perfectly!</p><button class="large-btn" onclick="restart()">Play Again</button>';
            parent.postMessage({ type: 'game_complete', success: true }, '*');
        }

        function restart() {
            overlay.style.display = 'none';
            init();
            run = true;
            paused = false;
        }

        function loop() {
            requestAnimationFrame(loop);
            if (!run || paused) return;
            updatePhysics();
            draw();
        }

        // Fixed Play Button Event Trigger
        document.getElementById('start').addEventListener('click', function (e) {
            e.preventDefault();
            mainMenuScreen.style.display = 'none';
            gameScreen.style.display = 'flex';
            init();
            run = true;
        });

        // Native Mobile Touch Interaction 
        cv.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = cv.getBoundingClientRect();
            const touch = e.touches[0];
            const tx = touch.clientX - rect.left;
            const ty = touch.clientY - rect.top;
            handleInteraction(tx, ty);
        }, { passive: false });

        // Desktop Mouse Interaction Fallback
        cv.addEventListener('mousedown', (e) => {
            const rect = cv.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            handleInteraction(mx, my);
        });

        // Fire layout engine loops safely
        requestAnimationFrame(loop);
    </script>

</body>

</html>
