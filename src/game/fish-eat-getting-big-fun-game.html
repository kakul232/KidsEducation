<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fish Eat Getting Big - Mobile Number Edition</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        body {
            background-color: #0b1d3a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 4px solid #00ffcc;
            border-radius: 8px;
            max-width: 100%;
            max-height: 100%;
        }

        canvas {
            background: linear-gradient(to bottom, #0d3967 0%, #031026 100%);
            display: block;
            max-width: 100%;
            height: auto;
        }

        .ui-panel {
            position: absolute;
            top: 15px;
            left: 15px;
            pointer-events: none;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            display: flex;
            gap: 25px;
        }

        .ui-panel span {
            color: #00ffcc;
        }

        #overlay-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(3, 16, 38, 0.93);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            text-align: center;
            padding: 20px;
            z-index: 10;
        }

        #overlay-screen.active {
            opacity: 1;
            pointer-events: auto;
        }

        button {
            background-color: #00ffcc;
            color: #031026;
            border: none;
            padding: 14px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(0, 255, 204, 0.4);
            transition: transform 0.1s, background-color 0.2s;
        }

        button:active {
            transform: scale(0.95);
        }
    </style>
</head>

<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="500"></canvas>

        <div class="ui-panel">
            <div>Score: <span id="scoreVal">0</span></div>
            <div>Your Level: <span id="levelVal">1</span></div>
        </div>

        <div id="overlay-screen">
            <h1 id="overlay-title" style="font-size: 36px; color: #ff3b30; margin-bottom: 10px;">GAME OVER</h1>
            <p id="overlay-desc" style="font-size: 18px; margin-bottom: 5px;">That fish's number was too high!</p>
            <p style="color: #aaa;">Final Score: <span id="finalScore">0</span></p>
            <button id="actionBtn">Play Again</button>
        </div>
    </div>

    <p style="margin-top: 15px; color: #7a9bbd; font-size: 14px; text-align: center; padding: 0 10px;">
        Control your fish by dragging your <b>Finger/Hand</b>. Eat fish with numbers <b>less than or equal to</b> yours!
    </p>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const scoreVal = document.getElementById('scoreVal');
        const levelVal = document.getElementById('levelVal');
        const finalScore = document.getElementById('finalScore');
        const overlayScreen = document.getElementById('overlay-screen');
        const overlayTitle = document.getElementById('overlay-title');
        const overlayDesc = document.getElementById('overlay-desc');
        const actionBtn = document.getElementById('actionBtn');

        let score = 0;
        let gameOver = false;
        let gameWon = false;
        let enemyFishArray = [];
        let particlesArray = [];
        let spawnTimer = 0;
        
        const maxNumber = 20; // Win milestone target level

        // Player Configuration
        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            level: 1, 
            radius: 25, 
            targetX: canvas.width / 2,
            targetY: canvas.height / 2,
            color: '#ff9500',
            facingLeft: false,

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                if (this.facingLeft) ctx.scale(-1, 1);

                // Tail
                ctx.beginPath();
                ctx.fillStyle = this.color;
                ctx.moveTo(-this.radius, 0);
                ctx.lineTo(-this.radius * 1.6, -this.radius * 0.5);
                ctx.lineTo(-this.radius * 1.6, this.radius * 0.5);
                ctx.closePath();
                ctx.fill();

                // Main Ellipse Body
                ctx.beginPath();
                ctx.ellipse(0, 0, this.radius * 1.3, this.radius, 0, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();

                // Eye
                ctx.beginPath();
                ctx.arc(this.radius * 0.5, -this.radius * 0.25, this.radius * 0.15, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.fill();
                ctx.beginPath();
                ctx.arc(this.radius * 0.55, -this.radius * 0.25, this.radius * 0.07, 0, Math.PI * 2);
                ctx.fillStyle = '#000';
                ctx.fill();

                ctx.restore();

                // Render Number Above Player Fish
                ctx.save();
                ctx.font = 'bold 16px Arial';
                ctx.fillStyle = '#ffffff';
                ctx.textAlign = 'center';
                ctx.shadowColor = '#000';
                ctx.shadowBlur = 4;
                ctx.fillText("" + this.level, this.x, this.y - this.radius - 8);
                ctx.restore();
            },

            update() {
                const dx = this.targetX - this.x;
                const dy = this.targetY - this.y;
                this.x += dx * 0.12; // Easing coefficient adjusted for touch responsiveness
                this.y += dy * 0.12;

                if (dx < -2) this.facingLeft = true;
                if (dx > 2) this.facingLeft = false;
            }
        };

        // Enemy Fish Setup
        class EnemyFish {
            constructor() {
                const fromLeft = Math.random() > 0.5;
                this.radius = 24;

                const levelPivot = Math.random();
                if (levelPivot < 0.6) {
                    // Spawn edible fish
                    this.level = Math.floor(Math.random() * player.level);
                    if (this.level < 1) this.level = 1;
                } else {
                    // Spawn hazard tier fish
                    this.level = Math.floor(Math.random() * 4) + player.level + 1;
                }

                if (fromLeft) {
                    this.x = -this.radius * 2;
                    this.speedX = Math.random() * 1.5 + 1.5;
                    this.facingLeft = false;
                } else {
                    this.x = canvas.width + this.radius * 2;
                    this.speedX = -(Math.random() * 1.5 + 1.5);
                    this.facingLeft = true;
                }

                this.y = Math.random() * (canvas.height - this.radius * 3) + this.radius;
            }

            draw() {
                let fishColor = '#ff3b30'; // Red if dangerous
                if (this.level <= player.level) {
                    fishColor = '#00ffcc'; // Mint green if safe
                }

                ctx.save();
                ctx.translate(this.x, this.y);
                if (this.facingLeft) ctx.scale(-1, 1);

                // Tail
                ctx.beginPath();
                ctx.fillStyle = fishColor;
                ctx.moveTo(-this.radius, 0);
                ctx.lineTo(-this.radius * 1.6, -this.radius * 0.5);
                ctx.lineTo(-this.radius * 1.6, this.radius * 0.5);
                ctx.closePath();
                ctx.fill();

                // Body
                ctx.beginPath();
                ctx.ellipse(0, 0, this.radius * 1.3, this.radius, 0, 0, Math.PI * 2);
                ctx.fillStyle = fishColor;
                ctx.fill();

                // Eye
                ctx.beginPath();
                ctx.arc(this.radius * 0.5, -this.radius * 0.25, this.radius * 0.15, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.fill();

                ctx.restore();

                // Display Level Text
                ctx.save();
                ctx.font = 'bold 16px Arial';
                ctx.fillStyle = (this.level <= player.level) ? '#00ffcc' : '#ff4d4d';
                ctx.textAlign = 'center';
                ctx.shadowColor = '#000';
                ctx.shadowBlur = 4;
                ctx.fillText("" + this.level, this.x, this.y - this.radius - 8);
                ctx.restore();
            }

            update() {
                this.x += this.speedX;
            }
        }

        // Particle effect bursts
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.radius = Math.random() * 3 + 2;
                this.speedX = (Math.random() - 0.5) * 6;
                this.speedY = (Math.random() - 0.5) * 6;
                this.alpha = 1;
                this.color = color;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.alpha -= 0.04;
            }
        }

        // --- MOBILE TOUCH LISTENERS ---
        function handleTouch(e) {
            if (gameOver || gameWon) return;
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            // Scaling logic maps dynamic CSS rendering width properties back onto raw Canvas values
            const touch = e.touches[0];
            player.targetX = (touch.clientX - rect.left) * (canvas.width / rect.width);
            player.targetY = (touch.clientY - rect.top) * (canvas.height / rect.height);
        }

        canvas.addEventListener('touchstart', handleTouch, { passive: false });
        canvas.addEventListener('touchmove', handleTouch, { passive: false });

        // Desktop Fallback
        canvas.addEventListener('mousemove', (e) => {
            if (gameOver || gameWon) return;
            const rect = canvas.getBoundingClientRect();
            player.targetX = (e.clientX - rect.left) * (canvas.width / rect.width);
            player.targetY = (e.clientY - rect.top) * (canvas.height / rect.height);
        });

        function createExplosion(x, y, color) {
            for (let i = 0; i < 10; i++) {
                particlesArray.push(new Particle(x, y, color));
            }
        }

        function checkWinCondition(earnedLevel) {
            if (earnedLevel >= maxNumber) {
                gameWon = true;
                
                // Show celebration Screen
                overlayTitle.innerHTML = `🎉 You Finished! 🎉`;
                overlayTitle.style.color = '#00ffcc';
                overlayDesc.innerHTML = `Awesome Counting! You reached level ${earnedLevel}!`;
                finalScore.innerText = score;
                actionBtn.innerText = "Play Again";
                overlayScreen.classList.add('active');

                // postMessage webhooks for parent execution spaces
                parent.postMessage({type: 'game_action', success: true, question: 'Count ' + earnedLevel, answer: earnedLevel}, '*');
                parent.postMessage({type: 'game_complete', success: true, correctCount: 1, incorrectCount: 0}, '*');
            } else {
                // Mid-tier success updates
                parent.postMessage({type: 'game_action', success: true, question: 'Count ' + earnedLevel, answer: earnedLevel}, '*');
            }
        }

        function triggerGameOver() {
            gameOver = true;
            overlayTitle.innerHTML = `GAME OVER`;
            overlayTitle.style.color = '#ff3b30';
            overlayDesc.innerHTML = `That fish's number was too high!`;
            finalScore.innerText = score;
            actionBtn.innerText = "Try Again";
            overlayScreen.classList.add('active');

            parent.postMessage({type: 'game_action', success: false, question: 'Target Level ' + player.level, answer: 'Hit Larger Fish'}, '*');
        }

        function resetGame() {
            score = 0;
            gameOver = false;
            gameWon = false;
            enemyFishArray = [];
            particlesArray = [];
            player.level = 1;
            player.x = canvas.width / 2;
            player.y = canvas.height / 2;
            player.targetX = canvas.width / 2;
            player.targetY = canvas.height / 2;

            scoreVal.innerText = score;
            levelVal.innerText = player.level;
            overlayScreen.classList.remove('active');
        }

        actionBtn.addEventListener('click', resetGame);
        actionBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            resetGame();
        });

        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (!gameOver && !gameWon) {
                player.update();
                player.draw();

                spawnTimer++;
                if (spawnTimer % 40 === 0) {
                    enemyFishArray.push(new EnemyFish());
                }

                enemyFishArray.forEach((fish, index) => {
                    fish.update();
                    fish.draw();

                    if (fish.x < -fish.radius * 3 || fish.x > canvas.width + fish.radius * 3) {
                        enemyFishArray.splice(index, 1);
                        return;
                    }

                    const dx = player.x - fish.x;
                    const dy = player.y - fish.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < player.radius + fish.radius * 0.8) {
                        if (player.level >= fish.level) {
                            createExplosion(fish.x, fish.y, '#00ffcc');
                            enemyFishArray.splice(index, 1);

                            score += fish.level * 10;
                            player.level += 1; // Increment level on successful hunt

                            scoreVal.innerText = score;
                            levelVal.innerText = player.level;

                            checkWinCondition(player.level);
                        } else {
                            triggerGameOver();
                        }
                    }
                });

                particlesArray.forEach((p, index) => {
                    p.update();
                    p.draw();
                    if (p.alpha <= 0) particlesArray.splice(index, 1);
                });
            }

            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>

</html>
