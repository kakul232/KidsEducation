<!DOCTYPE html><html style="height: 100%; margin: 0; padding: 0; overflow: hidden;"><body style="height: 100%; margin: 0; padding: 10px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between; background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%); color: white; font-family: 'Arial Rounded MT Bold', sans-serif; touch-action: none; overflow: hidden;"><style>@keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }.star-anim { animation: twinkle 1.5s infinite; display: inline-block; } button { transition: transform 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.3); } button:active { transform: scale(0.95); }</style><div id="header" style="text-align: center; font-size: 24px; font-weight: bold; color: #ffeb3b;">Round <span id="round">1</span> of 5</div><div id="gameBoard" style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;"><div id="problem" style="font-size: 64px; font-weight: 800; text-shadow: 0 0 20px #00d4ff;">? + ?</div><div id="stars" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; font-size: 35px; justify-items: center;"></div></div><div id="options" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px;"></div><script>const ctx = new (window.AudioContext || window.webkitAudioContext)(); function playSound(type) { const osc = ctx.createOscillator(); const gain = ctx.createGain(); osc.connect(gain); gain.connect(ctx.destination); if(type === 'correct') { osc.frequency.setValueAtTime(600, ctx.currentTime); osc.frequency.linearRampToValueAtTime(1000, ctx.currentTime + 0.2); } else { osc.frequency.setValueAtTime(200, ctx.currentTime); osc.frequency.linearRampToValueAtTime(100, ctx.currentTime + 0.2); } osc.start(); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3); osc.stop(ctx.currentTime + 0.3); } let round = 1, correctCount = 0, incorrectCount = 0; function generate() { const a = Math.floor(Math.random() * 5) + 1; const b = Math.floor(Math.random() * 5) + 1; const sum = a + b; document.getElementById('problem').innerText = a + ' + ' + b; const stars = document.getElementById('stars'); stars.innerHTML = ''; for(let i=0; i<sum; i++) { const span = document.createElement('span'); span.className = 'star-anim'; span.style.animationDelay = (i * 0.2) + 's'; span.innerHTML = '⭐'; stars.appendChild(span); } const opts = document.getElementById('options'); opts.innerHTML = ''; [sum, sum + (Math.random() > 0.5 ? 1 : -1) || 2].sort(() => Math.random() - 0.5).forEach(val => { const btn = document.createElement('button'); btn.innerText = val; btn.style = 'padding: 20px; font-size: 32px; border-radius: 20px; border: none; background: #6a1b9a; color: white; cursor: pointer; border: 2px solid #ce93d8;'; btn.onclick = () => { if(parseInt(btn.innerText) === sum) { playSound('correct'); correctCount++; nextRound(); } else { playSound('incorrect'); incorrectCount++; parent.postMessage({type: 'game_attempt', success: false}, '*'); } }; opts.appendChild(btn); }); } function nextRound() { if(round >= 5) { parent.postMessage({type: 'game_complete', success: true, correctCount, incorrectCount}, '*'); alert('Mission Accomplished! You are a Space Hero!'); round = 0; correctCount = 0; } round++; document.getElementById('round').innerText = round; generate(); } generate();</script></body></html>
