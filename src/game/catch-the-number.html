<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><title>Catch the Number</title><style>body{margin:0;padding:0;background:#f0f9ff;font-family:Arial, sans-serif;touch-action:none;overflow:hidden;display:flex;flex-direction:column;align-items:center;height:100vh;}#game-container{width:100%;max-width:400px;height:100%;display:flex;flex-direction:column;align-items:center;}#header{padding:20px;text-align:center;font-size:24px;font-weight:bold;color:#0284c7;}#hud{font-size:20px;margin-bottom:10px;color:#0369a1;}canvas{background:#fff;border:4px solid #bae6fd;border-radius:20px;width:90%;max-width:360px;touch-action:none;}.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.9);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:10;text-align:center;padding:20px;box-sizing:border-box;}button{padding:15px 30px;font-size:20px;border-radius:20px;border:none;background:#22c55e;color:white;font-weight:bold;cursor:pointer;box-shadow:0 6px #166534;}button:active{transform:translateY(4px);box-shadow:0 2px #166534;}</style></head><body><div id="game-container"><div id="header">🔢 Catch the Number!</div><div id="hud">Goal: Catch <span id="target-val">-</span></div><canvas id="cv"></canvas></div><div id="overlay" class="overlay"><h2 id="msg">Ready?</h2><button onclick="startGame()">Start Game</button></div><script>const cv=document.getElementById('cv'),ctx=cv.getContext('2d');const targetEl=document.getElementById('target-val'),overlay=document.getElementById('overlay'),msgEl=document.getElementById('msg');let target=8,score=0,balls=[],run=false;cv.width=360;cv.height=450;function spawn(){if(Math.random()<0.03){let val=Math.floor(Math.random()*10)+1;balls.push({x:Math.random()*(cv.width-40)+20,y:-40,val:val,r:25,speed:1.5+score*0.2});}}function startGame(){score=0;target=8;run=true;overlay.style.display='none';targetEl.textContent=target;}function draw(){ctx.clearRect(0,0,cv.width,cv.height);balls.forEach(b=>{ctx.fillStyle=b.val===target?'#22c55e':'#f43f5e';ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();ctx.fillStyle='white';ctx.textAlign='center';ctx.textBaseline='middle';ctx.font='bold 20px Arial';ctx.fillText(b.val,b.x,b.y);});}function update(){if(!run)return;balls.forEach(b=>b.y+=b.speed);balls=balls.filter(b=>b.y<cv.height+50);spawn();if(score>=10){run=false;msgEl.textContent='🎉 You won! You are a Math Master!';overlay.style.display='flex';parent.postMessage({type:'game_complete',success:true,correctCount:10,incorrectCount:0},'*');}}cv.addEventListener('touchstart',e=>{e.preventDefault();const rect=cv.getBoundingClientRect();const tx=e.touches[0].clientX-rect.left,ty=e.touches[0].clientY-rect.top;balls.forEach((b,i)=>{const dist=Math.hypot(b.x-tx,b.y-ty);if(dist<b.r+20){if(b.val===target){score++;target=Math.max(1,target-1);targetEl.textContent=target;balls.splice(i,1);parent.postMessage({type:'game_complete',success:true,correctCount:1,incorrectCount:0},'*');}else{parent.postMessage({type:'game_attempt',success:false},'*');}}});},{passive:false});function loop(){update();draw();requestAnimationFrame(loop);}loop();</script></body></html>
