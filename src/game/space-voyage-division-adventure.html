<!DOCTYPE html><html style='height: 100%;'><head><meta name='viewport' content='width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0'><style>body, html { height: 100%; width: 100%; margin: 0; padding: 10px; box-sizing: border-box; overflow: hidden; font-family: 'Arial Rounded MT Bold', sans-serif; background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%); color: white; display: flex; flex-direction: column; justify-content: space-around; } #game-canvas { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: space-around; padding: 10px; position: relative; } .star { position: absolute; background: white; border-radius: 50%; animation: twinkle 2s infinite; pointer-events: none; } @keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } } .planet { animation: float 6s ease-in-out infinite; font-size: 30px; margin: 5px; } @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } } .option-btn { font-size: 28px; padding: 15px 25px; margin: 8px; border-radius: 20px; border: none; background: #6366f1; color: white; box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4); touch-action: manipulation; transition: transform 0.2s; cursor: pointer; } .option-btn:active { transform: scale(0.9); } #feedback { font-size: 22px; font-weight: bold; height: 30px; color: #fbbf24; } </style></head><body><div id='game-canvas'><div id='progress' style='font-size: 18px;'>Round 1 of 5</div><div id='visual-display' style='font-size: 40px; display: flex; flex-wrap: wrap; justify-content: center; align-content: center;'></div><div id='question' style='font-size: 24px; text-align: center; padding: 0 10px;'></div><div id='options' style='display: flex; flex-wrap: wrap; justify-content: center;'></div><div id='feedback'></div></div><script>const ctx = new (window.AudioContext || window.webkitAudioContext)(); function playSound(freq, type) { const osc = ctx.createOscillator(); const gain = ctx.createGain(); osc.type = type; osc.frequency.setValueAtTime(freq, ctx.currentTime); gain.gain.setValueAtTime(0.1, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5); osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.5); } let round = 1; let correctCount = 0; let incorrectCount = 0; let currentAnswer = 0; function createStars() { for(let i=0; i<30; i++) { const s = document.createElement('div'); s.className = 'star'; s.style.width = Math.random()*3+'px'; s.style.height = s.style.width; s.style.top = Math.random()*100+'%'; s.style.left = Math.random()*100+'%'; s.style.animationDelay = Math.random()*2+'s'; document.body.appendChild(s); } } createStars(); function nextRound() { if (round > 5) { window.parent.postMessage({ type: 'game_complete', success: true, correctCount: correctCount, incorrectCount: incorrectCount }, '*'); document.body.innerHTML = '<div style="text-align:center; padding:20px; flex:1; display:flex; flex-direction:column; justify-content:center;"><h1>Mission Accomplished! 🚀</h1><p>You are a Math Star!</p></div>'; return; } const total = Math.floor(Math.random() * 5 + 3) * 2; currentAnswer = total / 2; document.getElementById('progress').innerText = `Round ${round} of 5`; document.getElementById('question').innerText = `Share ${total} stars between 2 astronauts. How many for each?`; const visual = document.getElementById('visual-display'); visual.innerHTML = ''; for(let i=0; i<total; i++) visual.innerHTML += '<div class="planet">⭐</div>'; let options = [currentAnswer, currentAnswer - 1, currentAnswer + 1, currentAnswer + 2].filter(n => n > 0).sort(() => Math.random() - 0.5); const optDiv = document.getElementById('options'); optDiv.innerHTML = ''; options.forEach(opt => { const btn = document.createElement('button'); btn.className = 'option-btn'; btn.innerText = opt; btn.onclick = () => check(opt); optDiv.appendChild(btn); }); } function check(val) { if (val === currentAnswer) { correctCount++; playSound(600, 'sine'); document.getElementById('feedback').innerText = 'Great job! Blast off! 🚀'; round++; setTimeout(nextRound, 1200); } else { incorrectCount++; playSound(200, 'sawtooth'); document.getElementById('feedback').innerText = 'Great try! Let\'s try again.'; window.parent.postMessage({ type: 'game_attempt', success: false }, '*'); } } nextRound(); </script></body></html>
